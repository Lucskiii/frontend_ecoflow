<section class="profile">
  <h1>Profil</h1>
  <p>Hier kannst du deine Profildaten einsehen und aktualisieren.</p>

  <form [formGroup]="profileForm" (ngSubmit)="save()">
    <label for="name">Name</label>
    <input id="name" type="text" formControlName="name" />

    <label for="email">E-Mail</label>
    <input id="email" type="email" formControlName="email" />

    <label for="umsatzAll">Umsatz Gesamt</label>
    <input id="umsatzAll" type="text" [value]="alltimeUmsatzDisplay" readonly />

    <label for="umsatz30d">Umsatz 30 Tage</label>
    <input id="umsatz30d" type="text" [value]="umsatz30dDisplay" readonly />

    <label for="umsatz7d">Umsatz 7 Tage</label>
    <input id="umsatz7d" type="text" [value]="umsatz7dDisplay" readonly />

    <div class="actions">
      <button type="submit" [disabled]="isSaving || isLoading">{{ isSaving ? 'Speichert...' : 'Speichern' }}</button>
      <button type="button" (click)="cancel()" [disabled]="isSaving || isLoading">Abbrechen</button>
      <a routerLink="/dashboard">Zurück zum Dashboard</a>
    </div>

    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>
</section>
